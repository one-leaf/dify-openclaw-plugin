      placeholder:
        en_US: Enter your API Key
        zh_Hans: 在此输入您的 API Key
    - variable: mode
      label:
        en_US: Completion Type
        zh_Hans: 完成类型
      type: select
      required: true
      default: "chat"
      options:
        - value: chat
          label:
            en_US: Chat
